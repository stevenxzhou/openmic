name: Promote version to latest

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Pick a Version (e.g. 1.0.21)"
        required: true
        type: string

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: stevenxzhou.com:5500
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: List available versions
        id: list_versions
        run: |
          echo "📦 Available versions in registry (excluding 'latest'):"
          TAGS=$(curl -s -u "${{ secrets.DOCKER_USERNAME }}:${{ secrets.DOCKER_PASSWORD }}" \
            https://stevenxzhou.com:5500/v2/openmic/tags/list | \
            jq -r '.tags[] | select(. != "latest")' | sort -V -r | head -5)
          echo "$TAGS"
          echo "---"

          # Check if requested version exists
          if echo "$TAGS" | grep -q "^${{ inputs.version }}$"; then
            echo "✅ Version ${{ inputs.version }} found in registry"
          else
            echo "❌ Version ${{ inputs.version }} not found in registry"
            echo "Available versions:"
            echo "$TAGS"
            exit 1
          fi

      - name: Pull target version
        run: |
          docker pull stevenxzhou.com:5500/openmic:${{ inputs.version }}

      - name: Tag as latest
        run: |
          docker tag stevenxzhou.com:5500/openmic:${{ inputs.version }} stevenxzhou.com:5500/openmic:latest

      - name: Push latest tag
        run: |
          docker push stevenxzhou.com:5500/openmic:latest

      - name: Summary
        run: |
          echo "✅ Successfully promoted version ${{ inputs.version }} to latest"
          echo "Registry: stevenxzhou.com:5500/openmic:latest"
